<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" width="560" height="120">
  <defs>
    <linearGradient id="archGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1D51"/>
      <stop offset="50%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0B1D51"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ========== ICON ========== -->
  <g transform="translate(8, 12)">
    <!-- Subtle glow under the arch -->
    <ellipse cx="48" cy="58" rx="26" ry="10" fill="url(#glowGrad)"/>

    <!-- Main bridge arch -->
    <path d="M 12,68 Q 48,4 84,68" 
          stroke="url(#archGrad)" stroke-width="4.5" fill="none" 
          stroke-linecap="round"/>

    <!-- Left pillar -->
    <line x1="27" y1="49" x2="27" y2="78" 
          stroke="#0F2B6E" stroke-width="3" stroke-linecap="round"/>

    <!-- Right pillar -->
    <line x1="69" y1="49" x2="69" y2="78" 
          stroke="#1E40AF" stroke-width="3" stroke-linecap="round"/>

    <!-- Base line -->
    <line x1="18" y1="80" x2="78" y2="80" 
          stroke="#0B1D51" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

    <!-- AI neural connection lines -->
    <line x1="48" y1="28" x2="27" y2="47" 
          stroke="#3B82F6" stroke-width="1.2" opacity="0.35" stroke-linecap="round"/>
    <line x1="48" y1="28" x2="69" y2="47" 
          stroke="#3B82F6" stroke-width="1.2" opacity="0.35" stroke-linecap="round"/>
    <line x1="27" y1="47" x2="69" y2="47" 
          stroke="#3B82F6" stroke-width="0.8" opacity="0.2" stroke-linecap="round" 
          stroke-dasharray="2.5,2.5"/>

    <!-- Apex node (AI brain) -->
    <circle cx="48" cy="26" r="5.5" fill="url(#nodeGrad)" filter="url(#softGlow)"/>
    <circle cx="48" cy="26" r="2.5" fill="white" opacity="0.5"/>

    <!-- Left node -->
    <circle cx="27" cy="47" r="3.8" fill="url(#nodeGrad)"/>
    <circle cx="27" cy="47" r="1.7" fill="white" opacity="0.4"/>

    <!-- Right node -->
    <circle cx="69" cy="47" r="3.8" fill="url(#nodeGrad)"/>
    <circle cx="69" cy="47" r="1.7" fill="white" opacity="0.4"/>

    <!-- Small accent dots (data flow) -->
    <circle cx="37" cy="37" r="1.3" fill="#60A5FA" opacity="0.5"/>
    <circle cx="59" cy="37" r="1.3" fill="#60A5FA" opacity="0.5"/>
  </g>

  <!-- ========== WORDMARK ========== -->
  <text x="118" y="73" font-family="'Inter', 'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
        font-size="40" letter-spacing="0.5" fill="url(#textGrad)">
    <tspan font-weight="300">Service</tspan><tspan font-weight="700">Bridge</tspan>
  </text>

  <!-- Tagline (optional subtle text) -->
  <text x="120" y="92" font-family="'Inter', 'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
        font-size="11" letter-spacing="3" fill="#3B82F6" opacity="0.6" font-weight="400">
    AI-POWERED LOCAL SERVICES
  </text>
</svg>
